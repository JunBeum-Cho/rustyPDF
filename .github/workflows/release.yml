name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles dmg,app
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Download pdfium binary
        run: node scripts/setup-pdfium.mjs

      - name: Build & release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-{1}', github.run_number, github.sha) }}
          releaseName: "RustyPDF ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustypdf-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*-setup.exe
          if-no-files-found: warn
